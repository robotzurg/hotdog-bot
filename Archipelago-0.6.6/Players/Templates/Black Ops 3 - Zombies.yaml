# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances you have for that option to be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    Means you have 5 chances for map shuffle to occur, and 15 chances for map shuffle to be turned
#    off.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

# Your name in-game, limited to 16 characters.
#     {player} will be replaced with the player's slot number.
#     {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
#     {number} will be replaced with the counter value of the name.
#     {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: Player{number}

# Used to describe your yaml. Useful if you have multiple files.
description: Default Black Ops 3 - Zombies Template

game: Black Ops 3 - Zombies
requires:
  version: 0.6.6 # Version of Archipelago required for this yaml to work as expected.
  game:
    Black Ops 3 - Zombies: 0.1.0 # Version of the world required for this yaml to work as expected.

Black Ops 3 - Zombies:
  ################
  # Game Options #
  ################
  progression_balancing:
    # A system that can move progression earlier, to try and prevent the player from getting stuck and bored early.
    # 
    # A lower setting means more getting stuck. A higher setting means less getting stuck.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-99: 0 # random value between 0 and 99
    disabled: 0 # equivalent to 0
    normal: 50 # equivalent to 50
    extreme: 0 # equivalent to 99

  accessibility:
    # Set rules for reachability of your items/locations.
    # 
    # **Full:** ensure everything can be reached and acquired.
    # 
    # **Minimal:** ensure what is needed to reach your goal can be acquired.
    full: 50
    minimal: 0

  ###################
  # General Options #
  ###################
  starting_maps_unlocked:
    # Number of maps to start unlocked, the rest will require AP items to access
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 15
    1: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-15: 0 # random value between 0 and 15

  randomized_shield_parts:
    # Shuffles your shield parts into the item pool
    'false': 0
    'true': 50

  mystery_box_special_items:
    # Shuffles special Mystery Box item unlocks (Wonder weapons, special equipment, specialist weapons) into the item pool
    'false': 0
    'true': 50

  mystery_box_regular_items:
    # Shuffles regular Mystery Box item unlocks into the item pool
    'false': 0
    'true': 50

  map_specific_wallbuys:
    # Enables map specific wallbuy items
    'false': 50
    'true': 0

  map_specific_machines:
    # Enables map specific perk machine items
    'false': 50
    'true': 0

  round_location_max:
    # Maximum of rounds per map to be included as an AP location / check. This will not exceed Goal Round if your goal condiiton is Victory Round
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 50
    16: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-50: 0 # random value between 0 and 50

  round_location_freq:
    # Frequency of rounds to award an AP location / check for.
    # e.g. Setting this to 3 and Max Round Location to 15 means you'll get a check on rounds 3, 6, 9, 12 and 15
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 10
    2: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-10: 0 # random value between 1 and 10

  easter_egg_checks_enabled:
    # Include Easter Egg steps as AP locations / checks when Easter Egg Hunt is not the goal conditon
    'false': 50
    'true': 0

  music_ee_enabled:
    # Include music easter eggs as AP locations / checks
    'false': 0
    'true': 50

  attachments_randomized:
    # Whether to randomize attachments per weapon per seed
    'false': 0
    'true': 50

  attachments_sight_weight:
    # Probability of a large sight (Recon, Infra-Red etc) being chosen instead of a small sight (Iron sights, reflex etc)
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 100
    30: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-100: 0 # random value between 0 and 100

  ###################
  # Goal Conditions #
  ###################
  goal_condition:
    # Condition to finish the see.
    # Easter Egg Hunt: Complete the Main Easter Egg on enabled maps
    # Weapon Quest: Complete all weapon quests on enabled maps
    # Victory Round: Reach a selected round on enabled maps
    easter_egg_hunt: 50
    weapon_quest: 0
    goal_round: 0

  goal_ee_random:
    # Randomize which Easter Eggs are required. If disabled, you may complete any number of enabled maps to meet your Easter Egg Goal Count
    'false': 50
    'true': 0

  goal_ee_count:
    # Number of Main Easter Eggs needed to complete the seed when running Easter Egg Hunt. This will not exceed the number of selected maps
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 6
    2: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-6: 0 # random value between 1 and 6

  goal_round:
    # Round to award Goal Round to award victory on when running the Victory Round goal condition
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 2
    # Maximum value is 100
    25: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-2-100: 0 # random value between 2 and 100

  ########################
  # Progressive Settings #
  ########################
  perk_limit_default_modifier:
    # Modifier for initial perk limit, e.g If a map has a perk limit of 4, then -1 modifier will make it 3
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is -4
    # Maximum value is 4
    -2: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range--4-4: 0 # random value between -4 and 4

  progressive_perk_limit_increase:
    # How many increases to the perk limit to add to the item pool
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 6
    4: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-6: 0 # random value between 0 and 6

  ################
  # Map Settings #
  ################
  map_shadows_enabled:
    # Enables Map: "Shadows of Evil"
    'false': 0
    'true': 50

  map_the_giant_enabled:
    # Enables Map: "The Giant".
    'false': 0
    'true': 50

  map_castle_enabled:
    # Enables Map: "Castle".
    'false': 0
    'true': 50

  castle_bow_count:
    # Number of Elemental Bow quests to include in checks or Weapon Quest goal conditions
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 4
    2: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-4: 0 # random value between 0 and 4

  map_zetsubou_enabled:
    # Enables Map: "Zetsubou No Shima".
    'false': 0
    'true': 50

  map_gorod_enabled:
    # Enabled Map: "Gorod Krovi"
    'false': 0
    'true': 50

  map_revelations_enabled:
    # Enabled Map: "Revelations"
    'false': 0
    'true': 50

  ##########################
  # Difficulty Adjustments #
  ##########################
  difficulty_gorod_egg_cooldown:
    # Instantly cool down the egg instead of waiting 2 rounds to retrieve it each time
    'false': 0
    'true': 50

  difficulty_gorod_dragon_wings:
    # Start the game with the Dragon Wings unlocked in the Department Store
    'false': 50
    'true': 0

  difficulty_ee_checkpoints:
    # Number of checkpoints along the easter egg quest, for completing various steps.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 3
    0: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-3: 0 # random value between 0 and 3

  difficulty_round_checkpoints:
    # Makes a checkpoint every X round, if above 0
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 15
    0: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-15: 0 # random value between 0 and 15

  #############
  # Deathlink #
  #############
  deathlink_enabled:
    # Deathlink Enabled. This can be disabled during the AP, but not during it.
    'false': 50
    'true': 0

  deathlink_send_mode:
    # Action which will send a deathlink
    any_player_down: 50
    any_player_death: 0
    end_game: 0

  deathlink_recv_mode:
    # Consequence of being sent a deathlink
    single_player_down: 50
    single_player_death: 0
    all_players_down: 0
    end_game: 0

  ##########
  # Filler #
  ##########
  gift_weight:
    # Weighting of gifts to replace filler with
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 100
    40: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-100: 0 # random value between 0 and 100

  trap_weight:
    # Weighting of traps to replace filler with
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 100
    0: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-100: 0 # random value between 0 and 100

  #######
  # WIP #
  #######
  special_rounds_enabled:
    # Enables Special Rounds (Dogs, Monkeys, ect.).
    'false': 0
    'true': 50

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    # Forces these items to be in their native world.
    []

  non_local_items:
    # Forces these items to be outside their native world.
    []

  start_inventory:
    # Start with the specified amount of these items. Example: "Bomb: 1"
    {}

  start_hints:
    # Start with these item's locations prefilled into the ``!hint`` command.
    []

  start_location_hints:
    # Start with these locations and their item prefilled into the ``!hint`` command.
    []

  exclude_locations:
    # Prevent these locations from having an important item.
    []

  priority_locations:
    # Prevent these locations from having an unimportant item.
    []

  item_links:
    # Share part of your item pool with other players.
    []

  plando_items:
    # Generic items plando.
    []
