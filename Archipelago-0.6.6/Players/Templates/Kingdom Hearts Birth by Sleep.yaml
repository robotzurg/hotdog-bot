# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances you have for that option to be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    Means you have 5 chances for map shuffle to occur, and 15 chances for map shuffle to be turned
#    off.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

# Your name in-game, limited to 16 characters.
#     {player} will be replaced with the player's slot number.
#     {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
#     {number} will be replaced with the counter value of the name.
#     {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: Player{number}

# Used to describe your yaml. Useful if you have multiple files.
description: Default Kingdom Hearts Birth by Sleep Template

game: Kingdom Hearts Birth by Sleep
requires:
  version: 0.6.6 # Version of Archipelago required for this yaml to work as expected.

Kingdom Hearts Birth by Sleep:
  ################
  # Game Options #
  ################
  progression_balancing:
    # A system that can move progression earlier, to try and prevent the player from getting stuck and bored early.
    # 
    # A lower setting means more getting stuck. A higher setting means less getting stuck.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-99: 0 # random value between 0 and 99
    disabled: 0 # equivalent to 0
    normal: 50 # equivalent to 50
    extreme: 0 # equivalent to 99

  accessibility:
    # Set rules for reachability of your items/locations.
    # 
    # **Full:** ensure everything can be reached and acquired.
    # 
    # **Minimal:** ensure what is needed to reach your goal can be acquired.
    full: 50
    minimal: 0

  #############
  # Locations #
  #############
  character:
    # Determines the expected player character.
    # 0: Ventus
    # 1: Aqua
    # 2: Terra
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 2
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-2: 0 # random value between 0 and 2
    ventus: 0 # equivalent to 0
    aqua: 0 # equivalent to 1
    terra: 50 # equivalent to 2

  final_terra_xehanort_ii:
    # Determines if Aqua will need to defeat Final Terra Xehanort II to complete her seed.
    # Does nothing if the player chooses a character other than Aqua
    'false': 50
    'true': 0

  realm_of_darkness:
    # If your character is Aqua, determines if Realm of Darkness is included as a world.
    'false': 50
    'true': 0

  mirage_arena:
    # Determines if Mirage Arena battle locations should be included.
    'false': 50
    'true': 0

  arena_global_locations:
    # Determines if there should be locations for the Mirage Arena missions that require beating the game with each character
    # Also enables Combined Threat and Monster of the Deep without their respective worlds
    # If playing on a fresh save leave this off or you'll have unreachable locations!
    'false': 50
    'true': 0

  command_board:
    # Determines if Mirage Arena Command Board locations should be included.
    'false': 50
    'true': 0

  arena_medals:
    # Determines if there should be locations for Mirage Arena medal collecting. Currently these have no logic or shortcuts beyond having Mirage Arena.
    'false': 50
    'true': 0

  minigames:
    # Determines whether to include locations for the Disney Town minigames and the racing minigames in Mirage Arena
    'false': 50
    'true': 0

  super_bosses:
    # Determines if Super Boss locations should be included.
    'false': 50
    'true': 0

  #########
  # Stats #
  #########
  exp_multiplier:
    # Determines the multiplier to apply to EXP gained
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 4
    # Maximum value is 160
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-4-160: 0 # random value between 4 and 160
    0.25x: 0 # equivalent to 4
    0.5x: 0 # equivalent to 8
    1x: 0 # equivalent to 16
    2x: 0 # equivalent to 32
    3x: 50 # equivalent to 48
    4x: 0 # equivalent to 64
    8x: 0 # equivalent to 128
    10x: 0 # equivalent to 160

  max_hp_increases:
    # Number of Max HP Increases are in the item pool.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 9
    8: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-9: 0 # random value between 0 and 9

  #############
  # Keyblades #
  #############
  randomize_keyblade_stats:
    # Determines if Keyblade stats should be randomized
    'false': 50
    'true': 0

  keyblade_min_str:
    # Determines the minimum Strength bonus a keyblade can have.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 2
    # Maximum value is 10
    2: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-2-10: 0 # random value between 2 and 10

  keyblade_max_str:
    # Determines the maximum Strength bonus a keyblade can have.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 2
    # Maximum value is 10
    10: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-2-10: 0 # random value between 2 and 10

  keyblade_min_mgc:
    # Determines the minimum Magic bonus a keyblade can have.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is -2
    # Maximum value is 10
    -2: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range--2-10: 0 # random value between -2 and 10

  keyblade_max_mgc:
    # Determines the maximum Magic bonus a keyblade can have.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is -2
    # Maximum value is 10
    7: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range--2-10: 0 # random value between -2 and 10

  ########
  # Misc #
  ########
  starting_worlds:
    # Number of random worlds to start with.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 11
    0: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-11: 0 # random value between 0 and 11

  advanced_logic:
    # If enabled, using commands for tricky movement and precise jumps will be required to reach many locations
    'false': 50
    'true': 0

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    # Forces these items to be in their native world.
    []

  non_local_items:
    # Forces these items to be outside their native world.
    []

  start_inventory:
    # Start with the specified amount of these items. Example: "Bomb: 1"
    {}

  start_inventory_from_pool:
    # Start with the specified amount of these items and don't place them in the world. Example: "Bomb: 1"
    # 
    # The game decides what the replacement items will be.
    {}

  start_hints:
    # Start with these item's locations prefilled into the ``!hint`` command.
    []

  start_location_hints:
    # Start with these locations and their item prefilled into the ``!hint`` command.
    []

  exclude_locations:
    # Prevent these locations from having an important item.
    []

  priority_locations:
    # Prevent these locations from having an unimportant item.
    []

  item_links:
    # Share part of your item pool with other players.
    []

  plando_items:
    # Generic items plando.
    []
