# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances you have for that option to be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    Means you have 5 chances for map shuffle to occur, and 15 chances for map shuffle to be turned
#    off.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

# Your name in-game, limited to 16 characters.
#     {player} will be replaced with the player's slot number.
#     {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
#     {number} will be replaced with the counter value of the name.
#     {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: RaveelXY

# Used to describe your yaml. Useful if you have multiple files.
description: Default Manual_PokemonXY_Snifit Template

game: Manual_PokemonXY_Snifit
requires:
  version: 0.6.6 # Version of Archipelago required for this yaml to work as expected.

Manual_PokemonXY_Snifit:
  ################
  # Game Options #
  ################
  progression_balancing:
    # A system that can move progression earlier, to try and prevent the player from getting stuck and bored early.
    # 
    # A lower setting means more getting stuck. A higher setting means less getting stuck.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-99: 0 # random value between 0 and 99
    disabled: 50 # equivalent to 0
    normal: 0 # equivalent to 50
    extreme: 0 # equivalent to 99

  accessibility:
    # Set rules for reachability of your items/locations.
    # 
    # **Full:** ensure everything can be reached and acquired.
    # 
    # **Minimal:** ensure what is needed to reach your goal can be acquired.
    full: 0
    minimal: 50

  game_version:
    # Choose which game you are playing. 
    # This only matters if you are shuffling Mega Evolutions.
    x: 0
    y: 50

  hidden_items:
    # Shuffles hidden items into the pool.
    'false': 50
    'true': 0

  dowsing_machine:
    # Hidden items require the Dowsing Machine in logic.
    'false': 0
    'true': 50

  npc_items:
    # Shuffles optional items given to you by NPCs into the pool.
    'false': 0
    'true': 50

  berry_trees:
    # Adds checks for berry trees.
    'false': 50
    'true': 0

  shop_tms:
    # Includes checks for TMs that have to be purchased. 6 Badges will be required for these to be in logic.
    # (This does nothing if your goal is Defeat Clemont)
    # 
    # CAUTION: SOME OF THE TMS ARE VERY EXPENSIVE AND WILL TAKE A LONG TIME TO AFFORD. USE AT YOUR OWN RISK.
    # (Or you can just say you got them, but that would be frowned upon)
    'false': 50
    'true': 0

  mega_evolutions:
    # All: The Mega Ring and all Mega Stones are shuffled. Mega Stones and (possible) Mega Evolutions are locations.
    # 
    # Exclude Rare: Same as 'All', but exclude the Mega Evolution check for Ampharos, as Mareep is only found in a 35% horde encounter.
    # Stones Only: The Mega Ring and all Mega Stones are shuffled. Mega Stones are locations. Mega Evolutions are not locations.
    # None: The Mega Ring and Mega Stones are not shuffled. Mega Stones and Mega Evolutions are not locations. Many are not obtainable pre-Elite Four.
    # 
    # NOTE: If shuffling encounters through Universal Pokemon Randomizer, pick one of the bottom 2 options or there will be logic bugs.
    all: 0
    exclude_rare: 0
    stones_only: 50
    none: 0

  roller_skates:
    # Shuffle the Roller Skates. If false, you start with them (since they can logically be picked up in sphere 1).
    'false': 50
    'true': 0

  skate_tricks:
    # Shuffles the Skate Tricks into item pool and adds their location checks. Also adds the 2 Lost Hotel checks that require learning them.
    'false': 0
    'true': 50

  backgroundsanity:
    # Adds checks for destroying the natural objects that can appear in the background of battles.
    # Also adds the 5 categories of moves (13 total moves) needed to destroy these objects into the pool.
    # 
    # NOTES: Randomizing TMs with Universal Pokemon Randomizer is not recommended if Backgroundsanity is turned on 
    #        Background objects on beaches (except Azure Bay) and Frost Cavern will not be in logic until you get any Fishing Rod.
    #        Route 17 objects require the Mamoswine Liscence
    # 
    # Basic: Only includes checks for destroying each type of object once.
    # All: Includes checks for destroying each object in every non post-game location they can appear once.
    # 
    # THIS IS A MEME AND WILL BE REALLY ANNOYING. YOU HAVE BEEN WARNED. Have fun :)
    'off': 50
    basic: 0
    all: 0

  goal:
    # Choose your victory condition.
    # 
    # Defeat Clemont goal (Sync friendly) requires 5 Badges and removes all location checks after North Lumiose.
    # Defeat Zygarde goal requires battling AZ and access to the Snowbelle region.
    become chamion: 0
    defeat clemont: 0
    defeat zygarde at terminus cave: 50

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    # Forces these items to be in their native world.
    []

  non_local_items:
    # Forces these items to be outside their native world.
    []

  start_inventory:
    # Start with the specified amount of these items. Example: "Bomb: 1"
    {}

  start_inventory_from_pool:
    # Start with the specified amount of these items and don't place them in the world. Example: "Bomb: 1"
    # 
    # The game decides what the replacement items will be.
    {}

  start_hints:
    # Start with these item's locations prefilled into the ``!hint`` command.
    []

  start_location_hints:
    # Start with these locations and their item prefilled into the ``!hint`` command.
    []

  exclude_locations:
    # Prevent these locations from having an important item.
    []

  priority_locations:
    # Prevent these locations from having an unimportant item.
    []

  item_links:
    # Share part of your item pool with other players.
    []

  plando_items:
    # Generic items plando.
    []
